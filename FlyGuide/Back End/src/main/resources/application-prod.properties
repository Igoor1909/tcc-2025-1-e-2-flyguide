# JWT
jwt.secret=${JWT_SECRET}
jwt.expiracao=${JWT_EXPIRACAO:86400000}

# DATASOURCE - MySQL (Railway injeta essas variáveis automaticamente)
spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}?useSSL=false&serverTimezone=America/Sao_Paulo&allowPublicKeyRetrieval=true
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}

# Porta do servidor (Railway injeta PORT automaticamente)
server.port=${PORT:8080}

# JPA / HIBERNATE
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# OPENAI MODERATION API
openai.api.key=${OPENAI_API_KEY:}

# ANTHROPIC API
anthropic.api.key=${ANTHROPIC_API_KEY:}

# GOOGLE PLACES API
google.places.api.key=${GOOGLE_PLACES_API_KEY:}

# SMTP (configurar via variáveis de ambiente no Railway)
spring.mail.host=${MAIL_HOST:${SPRING_MAIL_HOST:smtp.gmail.com}}
spring.mail.port=${MAIL_PORT:${SPRING_MAIL_PORT:587}}
spring.mail.username=${MAIL_USERNAME:${SPRING_MAIL_USERNAME:}}
spring.mail.password=${MAIL_PASSWORD:${SPRING_MAIL_PASSWORD:}}
spring.mail.from=${MAIL_FROM:${spring.mail.username}}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
