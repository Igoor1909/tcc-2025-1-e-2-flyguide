# JWT
jwt.secret=${JWT_SECRET}
jwt.expiracao=${JWT_EXPIRACAO:86400000}

# DATASOURCE - MySQL (Railway injeta essas variáveis automaticamente)
spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}?useSSL=false&serverTimezone=America/Sao_Paulo&allowPublicKeyRetrieval=true
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}

# Porta do servidor (Railway injeta PORT automaticamente)
server.port=${PORT:8080}

# JPA / HIBERNATE
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# OPENAI MODERATION API
openai.api.key=${OPENAI_API_KEY:}

# ANTHROPIC API
anthropic.api.key=${ANTHROPIC_API_KEY:}

# GOOGLE PLACES API
google.places.api.key=${GOOGLE_PLACES_API_KEY:}

# SMTP (configurar via variáveis de ambiente no Railway)
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
