# DATASOURCE - MYSQL
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/BD_FLY?useSSL=false&serverTimezone=America/Sao_Paulo&allowPublicKeyRetrieval=true
spring.datasource.username=root
